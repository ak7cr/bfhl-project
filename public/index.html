<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SRM Full Stack Engineering Challenge — BFHL Node Hierarchy Visualizer" />
  <title>BFHL | Node Hierarchy Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ───── Reset & Custom Properties ───── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #111827;
      --bg-card: rgba(17, 24, 39, 0.65);
      --bg-glass: rgba(255, 255, 255, 0.04);
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-glow: rgba(99, 102, 241, 0.25);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #818cf8;
      --accent-bright: #a5b4fc;
      --accent-glow: rgba(129, 140, 248, 0.15);
      --success: #34d399;
      --success-bg: rgba(52, 211, 153, 0.08);
      --danger: #fb7185;
      --danger-bg: rgba(251, 113, 133, 0.08);
      --warning: #fbbf24;
      --warning-bg: rgba(251, 191, 36, 0.08);
      --cyan: #22d3ee;
      --cyan-bg: rgba(34, 211, 238, 0.08);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 6px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      --shadow-glow: 0 0 40px rgba(129, 140, 248, 0.08);
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ───── Ambient Background Glow ───── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 15% 20%, rgba(129, 140, 248, 0.06), transparent),
        radial-gradient(ellipse 500px 350px at 85% 70%, rgba(34, 211, 238, 0.04), transparent),
        radial-gradient(ellipse 400px 300px at 50% 50%, rgba(251, 113, 133, 0.03), transparent);
      pointer-events: none;
      z-index: 0;
    }

    /* ───── Layout ───── */
    .app {
      position: relative;
      z-index: 1;
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    /* ───── Header ───── */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-glow);
      border: 1px solid var(--border-glow);
      color: var(--accent-bright);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 999px;
      margin-bottom: 16px;
    }

    .header .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse-dot 2s ease infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f1f5f9 30%, var(--accent-bright) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .header p {
      color: var(--text-secondary);
      font-size: 1rem;
      margin-top: 8px;
    }

    /* ───── Glass Panel ───── */
    .glass {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    /* ───── Input Section ───── */
    .input-section {
      padding: 24px;
      margin-bottom: 28px;
    }

    .input-section label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    #input-data {
      width: 100%;
      min-height: 160px;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.88rem;
      padding: 16px;
      resize: vertical;
      transition: border-color var(--transition), box-shadow var(--transition);
      line-height: 1.7;
    }

    #input-data:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #input-data::placeholder { color: var(--text-muted); }

    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-sans);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: #fff;
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(99, 102, 241, 0.4);
    }

    .btn-primary:active:not(:disabled) { transform: translateY(0); }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-subtle);
      padding: 11px 22px;
    }

    .btn-ghost:hover {
      background: var(--bg-glass);
      color: var(--text-primary);
    }

    .btn .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    .btn.loading .spinner { display: block; }
    .btn.loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ───── Error Banner ───── */
    .error-banner {
      display: none;
      padding: 14px 18px;
      border-radius: var(--radius-sm);
      background: var(--danger-bg);
      border: 1px solid rgba(251, 113, 133, 0.2);
      color: var(--danger);
      font-size: 0.88rem;
      margin-top: 16px;
      align-items: center;
      gap: 8px;
    }

    .error-banner.show { display: flex; }

    /* ───── Results ───── */
    .results {
      display: none;
      animation: fadeUp 0.4s ease;
    }

    .results.show { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ───── Stats Grid ───── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }

    .stat-card {
      padding: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border-subtle);
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-glow);
    }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .stat-trees .stat-value { color: var(--success); }
    .stat-cycles .stat-value { color: var(--danger); }
    .stat-root .stat-value { color: var(--accent-bright); }
    .stat-invalid .stat-value { color: var(--warning); }

    /* ───── Section Title ───── */
    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-icon {
      width: 28px; height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 0.85rem;
    }

    /* ───── Hierarchy Cards ───── */
    .hierarchy-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .hierarchy-card {
      border-radius: var(--radius);
      border: 1px solid var(--border-subtle);
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      overflow: hidden;
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .hierarchy-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-glow);
    }

    .hierarchy-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .root-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .root-node {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent-bright);
      font-family: var(--font-mono);
    }

    .tag {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 5px 12px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .tag-tree {
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid rgba(52, 211, 153, 0.2);
    }

    .tag-cycle {
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid rgba(251, 113, 133, 0.2);
    }

    .hierarchy-body { padding: 16px 20px; }

    .depth-info {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .depth-info strong { color: var(--cyan); }

    /* ───── Tree Visualization ───── */
    .tree-view {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      line-height: 1.9;
      color: var(--text-secondary);
    }

    .tree-node {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 1px 0;
    }

    .tree-connector {
      color: var(--text-muted);
      white-space: pre;
      user-select: none;
    }

    .tree-name {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px; height: 28px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.78rem;
      color: var(--text-primary);
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(34, 211, 238, 0.1));
      border: 1px solid rgba(99, 102, 241, 0.2);
    }

    .tree-name.is-root {
      background: linear-gradient(135deg, var(--accent), #6366f1);
      color: #fff;
      border: none;
    }

    .cycle-message {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-radius: var(--radius-xs);
      background: var(--danger-bg);
      border: 1px solid rgba(251, 113, 133, 0.15);
      color: var(--danger);
      font-size: 0.82rem;
    }

    /* ───── Chips ───── */
    .chips-section { margin-bottom: 28px; }

    .chips-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 6px 14px;
      border-radius: 999px;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      font-weight: 500;
    }

    .chip-invalid {
      background: var(--warning-bg);
      color: var(--warning);
      border: 1px solid rgba(251, 191, 36, 0.2);
    }

    .chip-duplicate {
      background: var(--cyan-bg);
      color: var(--cyan);
      border: 1px solid rgba(34, 211, 238, 0.2);
    }

    .chip-none {
      background: var(--bg-glass);
      color: var(--text-muted);
      border: 1px solid var(--border-subtle);
    }

    /* ───── JSON Toggle ───── */
    .json-section { margin-bottom: 28px; }

    .json-toggle {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      color: var(--text-muted);
      background: none;
      border: 1px solid var(--border-subtle);
      padding: 8px 16px;
      border-radius: var(--radius-xs);
      font-family: var(--font-sans);
      transition: all var(--transition);
    }

    .json-toggle:hover {
      color: var(--text-primary);
      border-color: var(--accent);
    }

    .json-pre {
      display: none;
      margin-top: 12px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 20px;
      overflow-x: auto;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      line-height: 1.7;
      color: var(--text-secondary);
      max-height: 500px;
      overflow-y: auto;
    }

    .json-pre.show { display: block; }

    /* ───── Responsive ───── */
    @media (max-width: 640px) {
      .app { padding: 20px 16px 40px; }
      .header h1 { font-size: 1.8rem; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .hierarchy-grid { grid-template-columns: 1fr; }
    }

    /* ───── Scrollbar ───── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="badge">SRM Full Stack Challenge</div>
      <h1>Node Hierarchy Visualizer</h1>
      <p>Parse directed edges, detect cycles, and visualize tree hierarchies</p>
    </header>

    <!-- Input -->
    <section class="input-section glass" id="input-section">
      <label for="input-data">Enter edges — one per line</label>
      <textarea
        id="input-data"
        placeholder="A->B&#10;A->C&#10;B->D&#10;C->E&#10;E->F&#10;X->Y&#10;Y->Z&#10;Z->X"
        spellcheck="false"
      ></textarea>
      <div class="actions">
        <button class="btn btn-primary" id="submit-btn" onclick="submitData()">
          <span class="spinner"></span>
          <span class="btn-text">Analyze Hierarchies</span>
        </button>
        <button class="btn btn-ghost" onclick="loadExample()">Load Example</button>
        <button class="btn btn-ghost" onclick="clearAll()">Clear</button>
      </div>
      <div class="error-banner" id="error-banner">
        <span>⚠️</span>
        <span id="error-text"></span>
      </div>
    </section>

    <!-- Results -->
    <section class="results" id="results">
      <div class="stats-grid" id="stats-grid"></div>

      <div>
        <div class="section-title">
          <span class="section-icon" style="background:var(--accent-glow);color:var(--accent-bright);">🌳</span>
          Hierarchies
        </div>
        <div class="hierarchy-grid" id="hierarchy-grid"></div>
      </div>

      <div class="chips-section" id="invalid-section">
        <div class="section-title">
          <span class="section-icon" style="background:var(--warning-bg);color:var(--warning);">⚠</span>
          Invalid Entries
        </div>
        <div class="chips-row" id="invalid-chips"></div>
      </div>

      <div class="chips-section" id="duplicate-section">
        <div class="section-title">
          <span class="section-icon" style="background:var(--cyan-bg);color:var(--cyan);">🔁</span>
          Duplicate Edges
        </div>
        <div class="chips-row" id="duplicate-chips"></div>
      </div>

      <div class="json-section">
        <button class="json-toggle" onclick="toggleJson()">
          <span id="json-toggle-text">Show Raw JSON</span>
        </button>
        <pre class="json-pre" id="json-output"></pre>
      </div>
    </section>
  </div>

  <script>
    /* ═══════════════════════════════════
       Submit handler
       ═══════════════════════════════════ */
    async function submitData() {
      const textarea = document.getElementById('input-data');
      const btn      = document.getElementById('submit-btn');
      const errBan   = document.getElementById('error-banner');
      const results  = document.getElementById('results');

      const lines = textarea.value.split('\n').filter(l => l.trim() !== '');

      if (!lines.length) {
        showError('Please enter at least one edge (e.g. A->B)');
        return;
      }

      errBan.classList.remove('show');
      results.classList.remove('show');
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const res = await fetch('/bfhl', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data: lines })
        });

        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.message || 'Server returned ' + res.status);
        }

        const json = await res.json();
        renderResults(json);
        results.classList.add('show');
      } catch (err) {
        showError(err.message || 'Failed to connect to the API');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    /* ═══════════════════════════════════
       Render full results
       ═══════════════════════════════════ */
    function renderResults(data) {
      const s = data.summary || {};

      /* --- Stats --- */
      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card stat-trees">
          <div class="stat-label">Valid Trees</div>
          <div class="stat-value">${s.total_trees ?? 0}</div>
        </div>
        <div class="stat-card stat-cycles">
          <div class="stat-label">Cycles Detected</div>
          <div class="stat-value">${s.total_cycles ?? 0}</div>
        </div>
        <div class="stat-card stat-root">
          <div class="stat-label">Largest Tree Root</div>
          <div class="stat-value">${s.largest_tree_root || '—'}</div>
        </div>
        <div class="stat-card stat-invalid">
          <div class="stat-label">Invalid Entries</div>
          <div class="stat-value">${(data.invalid_entries || []).length}</div>
        </div>
      `;

      /* --- Hierarchy cards --- */
      const hGrid = document.getElementById('hierarchy-grid');
      hGrid.innerHTML = '';

      for (const h of (data.hierarchies || [])) {
        const isCycle = h.has_cycle === true;
        const card = document.createElement('div');
        card.className = 'hierarchy-card';

        let body;
        if (isCycle) {
          body = '<div class="cycle-message">⟳ Cyclic dependency detected — no tree can be built</div>';
        } else {
          body = `
            <div class="depth-info">Depth: <strong>${h.depth}</strong> nodes on longest path</div>
            <div class="tree-view">${buildTreeHTML(h.tree, h.root)}</div>
          `;
        }

        card.innerHTML = `
          <div class="hierarchy-header">
            <div>
              <div class="root-label">Root Node</div>
              <div class="root-node">${esc(h.root)}</div>
            </div>
            <span class="tag ${isCycle ? 'tag-cycle' : 'tag-tree'}">
              ${isCycle ? '⟳ Cycle' : '✓ Tree'}
            </span>
          </div>
          <div class="hierarchy-body">${body}</div>
        `;
        hGrid.appendChild(card);
      }

      /* --- Chips --- */
      renderChips('invalid-chips', data.invalid_entries, 'chip-invalid');
      renderChips('duplicate-chips', data.duplicate_edges, 'chip-duplicate');

      /* --- Raw JSON --- */
      document.getElementById('json-output').textContent = JSON.stringify(data, null, 2);
      document.getElementById('json-output').classList.remove('show');
      document.getElementById('json-toggle-text').textContent = 'Show Raw JSON';
    }

    /* ═══════════════════════════════════
       Tree HTML builder (recursive)
       ═══════════════════════════════════ */
    function buildTreeHTML(tree, rootKey) {
      if (!tree || !tree[rootKey]) return '<span style="color:var(--text-muted)">Empty</span>';

      let html = `<div class="tree-node"><span class="tree-name is-root">${esc(rootKey)}</span></div>`;
      html += renderSubtree(tree[rootKey], '');
      return html;
    }

    function renderSubtree(obj, prefix) {
      const keys = Object.keys(obj);
      let html = '';

      keys.forEach((key, i) => {
        const isLast = i === keys.length - 1;
        const connector = isLast ? '└── ' : '├── ';
        const nextPrefix = prefix + (isLast ? '    ' : '│   ');

        html += `<div class="tree-node">
          <span class="tree-connector">${escHTML(prefix + connector)}</span>
          <span class="tree-name">${esc(key)}</span>
        </div>`;

        if (obj[key] && Object.keys(obj[key]).length > 0) {
          html += renderSubtree(obj[key], nextPrefix);
        }
      });

      return html;
    }

    /* ═══════════════════════════════════
       Chips renderer
       ═══════════════════════════════════ */
    function renderChips(containerId, entries, cls) {
      const el = document.getElementById(containerId);
      if (!entries || !entries.length) {
        el.innerHTML = '<span class="chip chip-none">None</span>';
        return;
      }
      el.innerHTML = entries.map(e =>
        `<span class="chip ${cls}">${esc(String(e))}</span>`
      ).join('');
    }

    /* ═══════════════════════════════════
       Utilities
       ═══════════════════════════════════ */
    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function escHTML(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function showError(msg) {
      document.getElementById('error-text').textContent = msg;
      document.getElementById('error-banner').classList.add('show');
    }

    function toggleJson() {
      const pre = document.getElementById('json-output');
      const txt = document.getElementById('json-toggle-text');
      pre.classList.toggle('show');
      txt.textContent = pre.classList.contains('show') ? 'Hide Raw JSON' : 'Show Raw JSON';
    }

    function loadExample() {
      document.getElementById('input-data').value =
`A->B
A->C
B->D
C->E
E->F
X->Y
Y->Z
Z->X
P->Q
Q->R
G->H
G->H
G->I
hello
1->2
A->`;
    }

    function clearAll() {
      document.getElementById('input-data').value = '';
      document.getElementById('results').classList.remove('show');
      document.getElementById('error-banner').classList.remove('show');
    }
  </script>
</body>
</html>
