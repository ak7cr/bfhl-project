<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SRM Full Stack Engineering Challenge — BFHL Node Hierarchy Visualizer" />
  <title>BFHL | Node Hierarchy Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="badge">SRM Full Stack Challenge</div>
      <h1>Node Hierarchy Visualizer</h1>
      <p>Parse directed edges, detect cycles, and visualize tree hierarchies</p>
    </header>

    <!-- Input -->
    <section class="input-section glass" id="input-section">
      <label for="input-data">Enter edges — one per line</label>
      <textarea
        id="input-data"
        placeholder="A->B&#10;A->C&#10;B->D&#10;C->E&#10;E->F&#10;X->Y&#10;Y->Z&#10;Z->X"
        spellcheck="false"
      ></textarea>
      <div class="actions">
        <button class="btn btn-primary" id="submit-btn" onclick="submitData()">
          <span class="spinner"></span>
          <span class="btn-text">Analyze Hierarchies</span>
        </button>
        <button class="btn btn-ghost" onclick="loadExample()">Load Example</button>
        <button class="btn btn-ghost" onclick="clearAll()">Clear</button>
      </div>
      <div class="error-banner" id="error-banner">
        <span>⚠️</span>
        <span id="error-text"></span>
      </div>
    </section>

    <!-- Results -->
    <section class="results" id="results">
      <div class="stats-grid" id="stats-grid"></div>

      <div>
        <div class="section-title">
          <span class="section-icon" style="background:var(--accent-glow);color:var(--accent-bright);">🌳</span>
          Hierarchies
        </div>
        <div class="hierarchy-grid" id="hierarchy-grid"></div>
      </div>

      <div class="chips-section" id="invalid-section">
        <div class="section-title">
          <span class="section-icon" style="background:var(--warning-bg);color:var(--warning);">⚠</span>
          Invalid Entries
        </div>
        <div class="chips-row" id="invalid-chips"></div>
      </div>

      <div class="chips-section" id="duplicate-section">
        <div class="section-title">
          <span class="section-icon" style="background:var(--cyan-bg);color:var(--cyan);">🔁</span>
          Duplicate Edges
        </div>
        <div class="chips-row" id="duplicate-chips"></div>
      </div>

      <div class="json-section">
        <button class="json-toggle" onclick="toggleJson()">
          <span id="json-toggle-text">Show Raw JSON</span>
        </button>
        <pre class="json-pre" id="json-output"></pre>
      </div>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
