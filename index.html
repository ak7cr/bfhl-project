<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SRM BFHL Challenge</title>
    <style>
      :root {
        --bg: #f7f3ea;
        --panel: #fffdf8;
        --ink: #1f2937;
        --muted: #6b7280;
        --accent: #0f766e;
        --accent-2: #f59e0b;
        --danger: #b91c1c;
      }
      body {
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 20%, #fff1c7 0 18%, transparent 19%),
          radial-gradient(circle at 95% 10%, #cde6df 0 14%, transparent 15%),
          linear-gradient(145deg, #fef8ea 0%, #eef7f4 45%, #f7f3ea 100%);
        min-height: 100vh;
      }
      .wrap {
        max-width: 1040px;
        margin: 0 auto;
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.9rem;
        letter-spacing: 0.3px;
      }
      p {
        margin-top: 0;
        color: var(--muted);
      }
      .panel {
        background: var(--panel);
        border: 1px solid #e7e0cf;
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
        padding: 16px;
      }
      textarea {
        width: 100%;
        min-height: 180px;
        margin-bottom: 12px;
        border: 1px solid #d7d0be;
        border-radius: 12px;
        padding: 12px;
        font-size: 14px;
        background: #fffdfa;
      }
      button {
        padding: 10px 16px;
        cursor: pointer;
        border: 0;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent), #0e7490);
        color: white;
        font-weight: 600;
      }
      button:disabled {
        opacity: 0.7;
        cursor: wait;
      }
      .grid {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }
      .card {
        background: #fff;
        border: 1px solid #e6e6e6;
        border-radius: 12px;
        padding: 12px;
      }
      .bad {
        color: var(--danger);
      }
      .good {
        color: #166534;
      }
      pre {
        background: #111827;
        color: #e5e7eb;
        padding: 12px;
        border-radius: 6px;
        overflow-x: auto;
        margin-top: 12px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>SRM Full Stack Challenge</h1>
      <p>Enter one edge per line. Example: A-&gt;B</p>

      <div class="panel">
        <textarea id="input" placeholder="A->B&#10;A->C&#10;B->D"></textarea>
        <button id="submitBtn" onclick="send()">Submit</button>
        <div id="message"></div>
      </div>

      <div id="cards" class="grid"></div>
      <pre id="output"></pre>
    </div>

    <script>
      async function send() {
        const input = document.getElementById("input")
        const output = document.getElementById("output")
        const cards = document.getElementById("cards")
        const message = document.getElementById("message")
        const submitBtn = document.getElementById("submitBtn")

        const lines = input.value.split("\n").filter((line) => line.trim() !== "")
        output.innerText = ""
        cards.innerHTML = ""
        message.innerHTML = ""

        submitBtn.disabled = true
        submitBtn.innerText = "Processing..."

        try {
          const res = await fetch("/bfhl", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ data: lines }),
          })

          const json = await res.json()

          if (!res.ok) {
            throw new Error(json.message || "API request failed")
          }

          const summary = json.summary || {}
          cards.innerHTML = `
            <div class="card"><strong>Total Trees:</strong> <span class="good">${summary.total_trees ?? 0}</span></div>
            <div class="card"><strong>Total Cycles:</strong> <span class="bad">${summary.total_cycles ?? 0}</span></div>
            <div class="card"><strong>Largest Tree Root:</strong> ${summary.largest_tree_root || "-"}</div>
            <div class="card"><strong>Invalid Entries:</strong> ${(json.invalid_entries || []).join(", ") || "None"}</div>
            <div class="card"><strong>Duplicate Edges:</strong> ${(json.duplicate_edges || []).join(", ") || "None"}</div>
          `

          output.innerText = JSON.stringify(json, null, 2)
          message.innerHTML = "<p class='good'>Request completed successfully.</p>"
        } catch (err) {
          message.innerHTML = `<p class='bad'>${err.message}</p>`
          output.innerText = ""
        } finally {
          submitBtn.disabled = false
          submitBtn.innerText = "Submit"
        }
      }
    </script>
  </body>
</html>
